<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Habitron</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:      #000000;
      --s1:      #0A0A0A;
      --s2:      #111111;
      --s3:      #1A1A1A;
      --s4:      #222222;
      --border:  rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.11);
      --text:    #F0F0F0;
      --muted:   #555555;
      --muted2:  #888888;
      --accent:  #FF4500;
      --accent2: #FF6A33;
      --green:   #00C853;
      --red:     #FF1744;
      --yellow:  #FFD600;
      --font:    'Inter', sans-serif;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ═══════════════════════════════
       SHELL
    ═══════════════════════════════ */
    .shell {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 480px;
      margin: 0 auto; position: relative;
    }

    /* ═══════════════════════════════
       HEADER
    ═══════════════════════════════ */
    .header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .h-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: white;
    }

    .h-name { font-weight: 800; font-size: 15px; letter-spacing: -0.3px; }
    .h-sub  {
      font-size: 11px; color: var(--green);
      display: flex; align-items: center; gap: 4px; margin-top: 1px;
    }
    .h-sub::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); display: inline-block;
      animation: gpulse 2s ease-in-out infinite;
    }
    @keyframes gpulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .h-streak {
      display: none; align-items: center; gap: 6px;
      background: rgba(255,69,0,0.1);
      border: 1px solid rgba(255,69,0,0.25);
      border-radius: 10px;
      padding: 6px 12px;
    }
    .h-streak.show { display: flex; }
    .h-streak-fire { font-size: 18px; line-height: 1; }
    .h-streak-num  {
      font-size: 20px; font-weight: 900;
      color: var(--accent); letter-spacing: -0.5px; line-height: 1;
    }
    .h-streak-lbl  {
      font-size: 10px; font-weight: 700; color: var(--muted2);
      letter-spacing: 0.5px; text-transform: uppercase;
    }

    .h-reset {
      font-size: 11px; color: var(--muted); cursor: pointer;
      padding: 4px 8px; border-radius: 4px;
      transition: color .15s;
    }
    .h-reset:hover { color: var(--text); }

    /* ═══════════════════════════════
       MESSAGES
    ═══════════════════════════════ */
    .msgs {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 18px 14px 8px;
      display: flex; flex-direction: column; gap: 6px;
      scroll-behavior: smooth;
    }
    .msgs::-webkit-scrollbar { width: 2px; }
    .msgs::-webkit-scrollbar-thumb { background: var(--s4); }

    /* date label */
    .date-lbl {
      text-align: center; font-size: 11px;
      color: var(--muted); padding: 4px 0 10px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* row */
    .row {
      display: flex; align-items: flex-end; gap: 8px;
      animation: rowIn .28s cubic-bezier(.22,.68,0,1.1) both;
    }
    .row.user { flex-direction: row-reverse; }

    @keyframes rowIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .row-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; flex-shrink: 0;
      margin-bottom: 3px;
    }
    .row.user .row-av { display: none; }

    .bbl {
      max-width: 78%; padding: 10px 14px;
      border-radius: 16px; font-size: 14px;
      line-height: 1.6; word-break: break-word;
      white-space: pre-wrap;
    }
    .row.ai .bbl {
      background: var(--s2);
      border: 1px solid var(--border2);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .row.user .bbl {
      background: var(--accent);
      border-bottom-right-radius: 4px;
      color: white; font-weight: 500;
    }

    .ts { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 4px; }
    .row.user .ts { text-align: right; }

    /* typing */
    .typing-row {
      display: flex; align-items: flex-end; gap: 8px;
      animation: rowIn .2s ease both;
    }
    .typing-bbl {
      background: var(--s2); border: 1px solid var(--border2);
      border-radius: 16px; border-bottom-left-radius: 4px;
      padding: 13px 16px;
      display: flex; align-items: center; gap: 5px;
    }
    .td {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted2);
      animation: tdot 1.3s ease-in-out infinite;
    }
    .td:nth-child(2) { animation-delay: .2s; }
    .td:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot {
      0%,80%,100% { transform:translateY(0); opacity:.4; }
      40%          { transform:translateY(-5px); opacity:1; }
    }

    /* ═══════════════════════════════
       CINEMATIC REVEAL OVERLAY
    ═══════════════════════════════ */
    .cinema {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0;
      opacity: 0; pointer-events: none;
      transition: opacity .5s;
    }
    .cinema.show { opacity: 1; pointer-events: all; }

    .cinema-line {
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px; color: var(--text);
      text-align: center; padding: 0 32px;
      opacity: 0; transform: translateY(12px);
      transition: opacity .6s ease, transform .6s ease;
      line-height: 1.4;
    }
    .cinema-line.acc { color: var(--accent); }
    .cinema-line.vis { opacity: 1; transform: translateY(0); }

    /* ═══════════════════════════════
       PLAN CARDS (slide in)
    ═══════════════════════════════ */
    .plan-wrap {
      max-width: 90%;
      display: flex; flex-direction: column; gap: 10px;
    }

    .plan-card {
      background: var(--s2); border: 1px solid var(--border2);
      border-radius: 14px; overflow: hidden;
      opacity: 0; transform: translateY(20px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .plan-card.in { opacity: 1; transform: translateY(0); }

    .plan-card-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--yellow));
    }
    .plan-card-body { padding: 16px 18px; }

    .plan-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
    }

    .plan-stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 8px; margin-bottom: 14px;
    }
    .ps {
      background: var(--s3); border-radius: 8px;
      padding: 10px 8px; text-align: center;
    }
    .ps-n {
      font-size: 22px; font-weight: 900;
      letter-spacing: -1px; line-height: 1;
      margin-bottom: 3px; color: var(--accent);
    }
    .ps-l { font-size: 10px; color: var(--muted2); letter-spacing: 0.3px; }

    .plan-verdict {
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 600; line-height: 1.5;
      margin-bottom: 14px;
    }
    .pv-ok     { background:rgba(0,200,83,0.08); border:1px solid rgba(0,200,83,0.2); color:var(--green); }
    .pv-risk   { background:rgba(255,214,0,0.07); border:1px solid rgba(255,214,0,0.18); color:var(--yellow); }
    .pv-danger { background:rgba(255,23,68,0.08); border:1px solid rgba(255,23,68,0.2); color:var(--red); }

    .plan-cta {
      width: 100%; padding: 13px;
      background: var(--accent); color: white;
      border: none; border-radius: 10px;
      font-family: var(--font); font-weight: 800;
      font-size: 14px; cursor: pointer; transition: all .15s;
      letter-spacing: 0.2px;
    }
    .plan-cta:hover { background: var(--accent2); }

    /* ═══════════════════════════════
       MISSION CARD (big task)
    ═══════════════════════════════ */
    .mission-wrap {
      max-width: 92%; width: 100%;
    }

    .mission-card {
      background: var(--s2); border: 1px solid var(--border2);
      border-radius: 16px; overflow: hidden;
      animation: missionIn .5s cubic-bezier(.22,.68,0,1.1) both;
    }
    @keyframes missionIn {
      from { opacity:0; transform:scale(0.96) translateY(16px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    .mission-top {
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--yellow));
    }

    .mission-body { padding: 22px 20px; }

    .mission-label {
      font-size: 10px; font-weight: 900; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted2);
      margin-bottom: 18px;
    }

    .mission-divider {
      height: 1px; background: var(--border2); margin: 14px 0;
    }

    .mission-subject {
      font-size: 24px; font-weight: 900;
      letter-spacing: -0.5px; line-height: 1.2;
      margin-bottom: 6px; color: var(--text);
    }

    .mission-detail {
      font-size: 13.5px; color: var(--muted2);
      line-height: 1.6; margin-bottom: 16px;
    }

    .mission-meta {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
    }

    .mission-time {
      display: flex; align-items: center; gap: 7px;
      font-size: 14px; font-weight: 700; color: var(--text);
    }
    .mission-time-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--s3); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }

    .mission-progress {
      flex: 1; text-align: right;
      font-size: 11px; color: var(--muted); font-weight: 600;
    }

    .mission-proof-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px;
    }

    /* ═══════════════════════════════
       PROOF UPLOAD
    ═══════════════════════════════ */
    .drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: 12px; padding: 20px;
      text-align: center; cursor: pointer;
      transition: all .15s; background: var(--s3);
    }
    .drop-zone:hover, .drop-zone.over {
      border-color: var(--green);
      background: rgba(0,200,83,0.04);
    }
    .dz-icon { font-size: 20px; margin-bottom: 6px; }
    .dz-text { font-size: 12px; color: var(--muted2); font-weight: 500; }
    .dz-img  {
      width: 100%; max-height: 160px; object-fit: cover;
      border-radius: 8px; margin-top: 10px; display: none;
      border: 1px solid var(--border2);
    }

    .proof-btn {
      width: 100%; margin-top: 10px; padding: 12px;
      background: var(--green); color: #001a0a;
      border: none; border-radius: 10px;
      font-family: var(--font); font-weight: 800;
      font-size: 14px; cursor: pointer;
      transition: all .15s; display: none;
      letter-spacing: 0.2px;
    }
    .proof-btn:hover { filter: brightness(1.1); }

    /* ═══════════════════════════════
       CHIPS
    ═══════════════════════════════ */
    .chips {
      display: flex; gap: 7px; flex-wrap: wrap;
      padding: 6px 14px 4px; flex-shrink: 0;
    }
    .chip {
      padding: 8px 16px; border-radius: 20px;
      background: var(--s2); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--font);
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.pri { background: var(--accent); border-color: var(--accent); color: white; }
    .chip.pri:hover { background: var(--accent2); }

    /* ═══════════════════════════════
       INPUT BAR
    ═══════════════════════════════ */
    .input-bar {
      display: flex; align-items: flex-end; gap: 9px;
      padding: 10px 12px 16px;
      background: var(--s1);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .txt {
      flex: 1; background: var(--s2);
      border: 1.5px solid var(--border2);
      border-radius: 22px; color: var(--text);
      font-family: var(--font); font-size: 14px;
      padding: 10px 16px; outline: none;
      resize: none; max-height: 100px; min-height: 42px;
      line-height: 1.5; transition: border-color .15s;
    }
    .txt:focus { border-color: rgba(255,69,0,0.5); }
    .txt::placeholder { color: var(--muted); }
    .txt:disabled { opacity: 0.3; cursor: not-allowed; }

    .sbtn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s;
    }
    .sbtn:hover { background: var(--accent2); transform: scale(1.06); }
    .sbtn:active { transform: scale(0.95); }
    .sbtn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .sbtn svg { width: 17px; height: 17px; fill: white; }

    /* AI message — strict mode red tint */
    .row.ai.strict .bbl {
      border-color: rgba(255,23,68,0.3);
      background: rgba(255,23,68,0.05);
    }

    #proof-file { display: none; }
  </style>
</head>
<body>

<!-- CINEMATIC OVERLAY -->
<div class="cinema" id="cinema">
  <div class="cinema-line" id="cl-1"></div>
</div>

<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="h-avatar">H</div>
      <div>
        <div class="h-name">Habitron</div>
        <div class="h-sub" id="h-sub">Online</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="h-streak" id="h-streak">
        <span class="h-streak-fire">🔥</span>
        <div>
          <div class="h-streak-num" id="streak-n">0</div>
          <div class="h-streak-lbl">Streak</div>
        </div>
      </div>
      <div class="h-reset" onclick="hardReset()">Reset</div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs">
    <div class="date-lbl" id="date-lbl"></div>
  </div>

  <!-- CHIPS -->
  <div class="chips" id="chips"></div>

  <!-- INPUT -->
  <div class="input-bar">
    <textarea class="txt" id="txt"
      placeholder="Message..."
      rows="1"
      onkeydown="onKey(event)"
      oninput="onResize(this)"
      disabled
    ></textarea>
    <button class="sbtn" id="sbtn" onclick="onSend()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<input type="file" id="proof-file" accept="image/*" onchange="onFilePick(event)"/>

<script>

/* API calls go to /api/chat — key is stored securely on server */

/* ===== STATE ===== */
var S = {
  phase: "onboard",
  step: 0,
  data: { exam:"", date:"", hours:"", done:"", pending:"", psych:"" },
  daysLeft: 90,
  plan: null,
  tasks: [],
  current: null,
  doneTasks: [],
  streak: 0,
  missed: 0,
  missedDays: 0,
  lastProofDate: null,
  history: []
};

/* ===== ONBOARDING STEPS ===== */
var STEPS = [
  {
    key: "exam",
    q: "Kaun sa exam prepare kar raha hai?",
    chips: ["JEE","NEET","UPSC","CAT","GATE","Other"],
    ok: function(v){ return v.trim().length > 0; }
  },
  {
    key: "date",
    q: function(){
      return S.data.exam + ".\n\nExam ki exact date bata. (jaise: 15 May 2025)";
    },
    chips: [],
    ok: function(v){ return v.trim().length > 2; }
  },
  {
    key: "hours",
    q: "Roz kitne ghante de sakta hai padhai ko?\n\nSach bol. Judge nahi karunga.",
    chips: ["1-2 ghante","3-4 ghante","5-6 ghante","6+ ghante"],
    ok: function(v){ return v.trim().length > 0; }
  },
  {
    key: "done",
    q: "Ab bata — kya kya cover ho chuka hai? Subjects, chapters, topics — jo bhi.",
    chips: ["Kuch khaas nahi hua","Sirf basics","Half syllabus","Almost done"],
    ok: function(v){ return v.trim().length > 0; }
  },
  {
    key: "pending",
    q: "Kya kya baki hai? Weak topics, chhute hue chapters — sab likh de.",
    chips: ["Poora syllabus baaki"],
    ok: function(v){ return v.trim().length > 0; }
  },
  {
    key: "psych",
    q: "Last sawaal — ye important hai.\n\nJab padhai nahi hoti, exactly kya hota hai? Kaun sa moment hota hai jab sab ruk jaata hai?",
    chips: [
      "Bada topic dekhke brain freeze",
      "Start karta hoon phir phone",
      "Raat ko plan, subah nahi hota",
      "Sab overwhelming lagta hai"
    ],
    ok: function(v){ return v.trim().length > 0; }
  }
];

/* ===== INIT ===== */
window.onload = function() {
  var dl = document.getElementById("date-lbl");
  if (dl) {
    dl.textContent = new Date().toLocaleDateString("en-IN", {
      weekday:"long", day:"numeric", month:"long"
    }).toUpperCase();
  }

  try {
    var sv = localStorage.getItem("hb_v5");
    if (sv) {
      var p = JSON.parse(sv);
      S = p;
      restoreSession();
      return;
    }
  } catch(e){}

  freshStart();
};

function save() {
  try { localStorage.setItem("hb_v5", JSON.stringify(S)); } catch(e){}
}

/* ===== RESTORE ===== */
function restoreSession() {
  updateHeader();
  if (S.phase === "active" || S.phase === "proof_wait") {
    typing(function(){
      addAI("Wapas aa gaye.");
    }, 600);
    setTimeout(function(){
      checkMissedDays();
    }, 1500);
  } else {
    freshStart();
  }
}

function checkMissedDays() {
  var today = new Date().toDateString();
  if (S.lastProofDate && S.lastProofDate !== today) {
    var last = new Date(S.lastProofDate);
    var now  = new Date();
    now.setHours(0,0,0,0);
    last.setHours(0,0,0,0);
    var diff = Math.round((now - last) / 86400000);
    if (diff > 0) {
      S.missedDays = diff;
      S.streak = 0;
      save();
      showStrictMessage(diff);
      return;
    }
  }
  showTask();
}

function showStrictMessage(days) {
  var msg = "";
  var isStrict = true;

  if (days === 1) {
    msg = "Kal proof nahi aaya.\n\nTera exam ab " + (S.daysLeft - 1) + " din door hai.\n\nAaj double kaam hoga. " + (S.current ? Math.round(S.current.minutes * 1.5) : 90) + " min. Koi option nahi.";
  } else if (days === 2) {
    msg = "2 din waste.\n\n" + (days * 2) + " topics ka backlog ban gaya.\n\nRecover karna mushkil hoga — but possible hai. Abhi shuru kar.";
  } else {
    msg = "3 din se proof nahi hai.\n\nSeedha poochhta hoon — tu seriously karna chahta hai ya nahi?\n\nAgar haan — abhi reply kar.\nAgar nahi — reset kar aur tab aa jab ready ho.";
  }

  typing(function(){
    addAI(msg, true);
    if (days >= 3) {
      setChips(["Haan, seriously karna chahta hoon","Reset karta hoon"], function(v){
        clearChips();
        addUser(v);
        if (v.indexOf("Reset") !== -1) {
          hardReset();
        } else {
          typing(function(){
            addAI("Theek hai.\n\nKoi second chance nahi — ye pehla aur aakhri warning hai.\n\nKaam shuru karte hain.");
            setTimeout(showTask, 1000);
          }, 1200);
        }
      });
    } else {
      setTimeout(showTask, 1500);
    }
  }, 1500);
}

/* ===== FRESH START ===== */
function freshStart() {
  S.phase = "onboard";
  S.step = 0;
  save();

  typing(function(){
    addAI("Habitron.");
  }, 800);

  setTimeout(function(){
    typing(function(){
      addAI("Main tera AI exam coach hoon.\n\nTujhe koi timetable nahi banana. Koi plan nahi banana. Koi decision nahi lena.\n\nBas mujhe kuch baatein bata — main baaki sab handle kar lunga.");
    }, 1500);
  }, 1800);

  setTimeout(function(){
    typing(function(){
      addAI("Shuru karte hain.");
      setTimeout(function(){ askStep(0); }, 500);
    }, 1000);
  }, 4500);
}

/* ===== ONBOARDING ===== */
function askStep(idx) {
  if (idx >= STEPS.length) {
    runAnalysis();
    return;
  }
  S.step = idx;
  save();

  var step = STEPS[idx];
  var q    = typeof step.q === "function" ? step.q() : step.q;

  typing(function(){
    addAI(q);
    if (step.chips && step.chips.length) {
      setChips(step.chips, function(v){ processAnswer(v); });
    }
    enableInput();
  }, 1500 + Math.random() * 400);
}

function processAnswer(val) {
  val = val.trim();
  var step = STEPS[S.step];
  if (!step.ok(val)) {
    clearChips(); disableInput();
    typing(function(){
      addAI("Thoda aur bata.");
      setTimeout(function(){ askStep(S.step); }, 400);
    }, 1000);
    return;
  }
  clearChips(); disableInput();
  addUser(val);
  S.data[step.key] = val;
  save();
  setTimeout(function(){ askStep(S.step + 1); }, 300);
}

/* ===== ANALYSIS ===== */
function runAnalysis() {
  disableInput(); clearChips();

  // Parse days left
  var dl = 90;
  try {
    var ds = S.data.date;
    var parsed = new Date(ds);
    if (isNaN(parsed)) parsed = new Date(ds + " 2025");
    if (!isNaN(parsed)) {
      var t = new Date(); t.setHours(0,0,0,0);
      dl = Math.max(1, Math.ceil((parsed - t) / 86400000));
    }
  } catch(e){}
  S.daysLeft = dl;
  save();

  // Cinematic reveal
  runCinema(dl, function(){
    // After cinema, call AI
    setStatus("Analyzing...");

    callGroqRaw([
      {
        role: "system",
        content:
          "Tu HABITRON hai. Strict AI exam coach. Hinglish. Zero fluff. Short sentences.\n\n" +
          "TASK RULES — mandatory:\n" +
          "- Har task SIRF EK chapter ya concept — 'NCERT pura karo' INVALID hai\n" +
          "- Title mein book + chapter number: 'NCERT GEO CL11 CH2' ya 'LAXMIKANTH CH5'\n" +
          "- Detail: exactly kya padhna/likhna/solve karna hai — 1 specific sentence\n" +
          "- Minutes: 1 chapter = max 90 min, 1 concept = 45-60 min\n" +
          "- 'NCERT Geography' ko 11 alag tasks mein todo — ek chapter ek task\n\n" +
          "Respond EXACTLY in this format — nothing else:\n" +
          "PSYCH: [internal analysis 1-2 lines]\n" +
          "FEASIBILITY: ok|risk|danger\n" +
          "VERDICT: [1-2 line honest statement — no sugar coating]\n" +
          "TASKS: [JSON max 30: [{\"title\":\"SPECIFIC CAPS\",\"detail\":\"exact 1 sentence\",\"minutes\":60}]]\n" +
          "FIRST_MSG: [1-2 line — plan ready, ab sirf 1 kaam ek baar. Hinglish. No emojis.]"
      },
      {
        role: "user",
        content:
          "Exam: " + S.data.exam +
          " | Date: " + S.data.date + " (~" + dl + " din)" +
          " | Daily: " + S.data.hours +
          "\nDone: " + (S.data.done || "nothing") +
          "\nPending: " + (S.data.pending || "not given") +
          "\nPsych: " + (S.data.psych || "not given")
      }
    ], 2000, function(result, err){
      setStatus("Online");

      if (err) {
        addAI("API error: " + err + "\n\nKey check karo.");
        enableInput();
        return;
      }

      // Parse
      var feasibility = (extractF(result,"FEASIBILITY") || "risk").trim().toLowerCase();
      var verdict     = extractF(result,"VERDICT") || "Timeline tight hai.";
      var psych       = extractF(result,"PSYCH") || "";
      var firstMsg    = extractF(result,"FIRST_MSG") || "Plan ready hai. Ab sirf ek kaam ek baar milega.";

      var tasks = [];
      var tm = result.match(/TASKS:\s*(\[[\s\S]+?\])(?=\nFIRST_MSG|$)/);
      if (tm) { try { tasks = JSON.parse(tm[1]); } catch(e){} }
      if (!tasks.length) tasks = buildFallback();

      S.plan    = { feasibility: feasibility, verdict: verdict, dl: dl };
      S.tasks   = tasks;
      S.current = tasks[0] || null;
      S.phase   = "active";
      S.history = [{
        role: "system",
        content: "Tu HABITRON hai. No emojis (except 🔥 for streak). Short. Direct. Hinglish. Psych: " + psych
      }];
      save();

      typing(function(){
        addAI(firstMsg);
        setTimeout(function(){
          showPlanCards(feasibility, verdict, dl, tasks.length);
        }, 1200);
      }, 1500);
    });
  });
}

/* ─── CINEMATIC SEQUENCE ─── */
function runCinema(daysLeft, done) {
  var cinema = document.getElementById("cinema");
  var line   = document.getElementById("cl-1");

  var lines = [
    { text: "Tera analysis complete hua.", acc: false },
    { text: daysLeft + " din. " + S.data.exam + ".", acc: false },
    { text: "Sirf ek condition pe.", acc: true }
  ];

  cinema.classList.add("show");

  var i = 0;
  function next() {
    if (i >= lines.length) {
      setTimeout(function(){
        cinema.classList.remove("show");
        setTimeout(done, 600);
      }, 1600);
      return;
    }
    var l = lines[i];
    line.textContent  = l.text;
    line.className    = "cinema-line" + (l.acc ? " acc" : "");
    // force reflow
    void line.offsetWidth;
    line.classList.add("vis");
    i++;
    setTimeout(function(){
      line.classList.remove("vis");
      setTimeout(next, 600);
    }, 2000);
  }
  setTimeout(next, 400);
}

/* ─── PLAN CARDS ─── */
function showPlanCards(feas, verdict, dl, taskCount) {
  var cls = feas === "ok" ? "pv-ok" : feas === "danger" ? "pv-danger" : "pv-risk";

  var wrap = document.createElement("div");
  wrap.className = "row ai";
  wrap.innerHTML =
    '<div class="row-av">H</div>' +
    '<div class="plan-wrap" id="plan-wrap">' +
      '<div class="plan-card" id="pc1">' +
        '<div class="plan-card-bar"></div>' +
        '<div class="plan-card-body">' +
          '<div class="plan-tag">Analysis Complete</div>' +
          '<div class="plan-stats">' +
            '<div class="ps"><div class="ps-n">' + dl + '</div><div class="ps-l">Din Bache</div></div>' +
            '<div class="ps"><div class="ps-n" style="color:var(--yellow)">' + taskCount + '</div><div class="ps-l">Tasks</div></div>' +
            '<div class="ps"><div class="ps-n" style="color:var(--green)">' + S.data.hours.replace(/[^0-9\-+]/g,'').charAt(0) + 'h</div><div class="ps-l">Per Day</div></div>' +
          '</div>' +
          '<div class="plan-verdict ' + cls + '">' + escH(verdict) + '</div>' +
          '<button class="plan-cta" onclick="launchFirstTask()">Pehla Task Dekho &rarr;</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  appendEl(wrap);

  // Slide in
  setTimeout(function(){
    var c = document.getElementById("pc1");
    if (c) c.classList.add("in");
  }, 100);
}

function buildFallback() {
  var raw  = S.data.pending || "Topic";
  var list = raw.split(/[,\n]/).filter(function(x){ return x.trim(); });
  var mins = 45;
  return list.slice(0,25).map(function(t,i){
    return { title: t.trim().toUpperCase(), detail: t.trim() + " — notes banao, examples solve karo.", minutes: mins };
  });
}

function launchFirstTask() {
  addUser("Dekh raha hoon.");
  setTimeout(showTask, 400);
}

/* ===== TASK DISPLAY ===== */
function showTask() {
  if (!S.current) {
    typing(function(){
      addAI("Sare tasks complete.\n\nJa aur exam mein dhamaka kar.");
      setStatus("Done");
    }, 1000);
    return;
  }

  var t     = S.current;
  var total = S.doneTasks.length + S.tasks.length;
  var done  = S.doneTasks.length;

  var wrap = document.createElement("div");
  wrap.className = "row ai";
  wrap.innerHTML =
    '<div class="row-av">H</div>' +
    '<div class="mission-wrap">' +
      '<div class="mission-card">' +
        '<div class="mission-top"></div>' +
        '<div class="mission-body">' +
          '<div class="mission-label">TODAY\'S MISSION</div>' +
          '<div class="mission-divider"></div>' +
          '<div class="mission-subject">' + escH(t.title) + '</div>' +
          '<div class="mission-detail">' + escH(t.detail) + '</div>' +
          '<div class="mission-meta">' +
            '<div class="mission-time">' +
              '<div class="mission-time-icon">&#9201;</div>' +
              t.minutes + ' minutes' +
            '</div>' +
            '<div class="mission-progress">' + (done+1) + ' / ' + total + '</div>' +
          '</div>' +
          '<div class="mission-divider"></div>' +
          '<div class="mission-proof-label">Proof required to unlock next task</div>' +
          '<div class="drop-zone" id="dz"' +
            ' onclick="document.getElementById(\'proof-file\').click()"' +
            ' ondragover="event.preventDefault();this.classList.add(\'over\')"' +
            ' ondragleave="this.classList.remove(\'over\')"' +
            ' ondrop="onDrop(event)">' +
            '<div class="dz-icon">&#128247;</div>' +
            '<div class="dz-text">PROOF UPLOAD KARO — click ya drag</div>' +
            '<img id="proof-img" class="dz-img"/>' +
          '</div>' +
          '<button class="proof-btn" id="proof-btn" onclick="submitProof()">Proof Submit &mdash; Task Complete</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  typing(function(){
    appendEl(wrap);
    S.phase = "proof_wait";
    save();
    setChips(["Shuru kar diya","Samajh nahi aaya","Skip ho gaya"], function(v){
      clearChips(); addUser(v);
      if (v === "Shuru kar diya") {
        typing(function(){
          addAI("Theek hai. Proof bhejo jab ho jaaye.");
        }, 1200);
      } else if (v === "Samajh nahi aaya") {
        clarifyTask();
      } else {
        handleSkip();
      }
    });
    enableInput();
  }, 1200);
}

function clarifyTask() {
  disableInput(); clearChips();
  callAI(
    "Task: " + S.current.title + ". Detail: " + S.current.detail + ". Student ko samajh nahi aaya. Simpler explain karo. 3 lines max.",
    250, function(r){
      addAI(r || "Step by step karo:\n\n" + S.current.detail);
    }
  );
}

function handleSkip() {
  S.missed++;
  S.missedDays = (S.missedDays || 0) + 1;
  S.streak = 0;
  save();
  updateHeader();
  showStrictMessage(S.missedDays);
}

/* ===== PROOF SYSTEM ===== */
function onDrop(e) {
  e.preventDefault();
  var dz = document.getElementById("dz");
  if (dz) dz.classList.remove("over");
  var f = e.dataTransfer.files[0];
  if (f && f.type.startsWith("image/")) loadProof(f);
}

function onFilePick(e) {
  if (e.target.files[0]) loadProof(e.target.files[0]);
}

function loadProof(file) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = document.getElementById("proof-img");
    var btn = document.getElementById("proof-btn");
    if (img) { img.src = ev.target.result; img.style.display = "block"; }
    if (btn) btn.style.display = "block";
  };
  reader.readAsDataURL(file);
}

function submitProof() {
  var img = document.getElementById("proof-img");
  if (!img || !img.src || img.style.display === "none") {
    alert("Pehle proof upload karo.");
    return;
  }

  clearChips();
  disableInput();

  typing(function(){
    addAI("Proof mil gaya. Verify kar raha hoon...");
  }, 800);

  // Use Groq vision to verify proof
  verifyProofWithAI(img.src, function(valid, reason) {
    if (!valid) {
      // Reject proof
      typing(function(){
        addAI(reason || "Ye proof nahi hai. Actual kaam dikha — notes, screen, ya jo bhi kiya.");
        enableInput();
        // Re-show proof upload
        var btn = document.getElementById("proof-btn");
        var pimg = document.getElementById("proof-img");
        if (btn) { btn.style.display = "none"; }
        if (pimg) { pimg.style.display = "none"; pimg.src = ""; }
      }, 1500);
      return;
    }

    // Valid proof — accept
    var today = new Date().toDateString();
    S.lastProofDate = today;
    S.streak++;
    S.missedDays = 0;
    S.doneTasks.push(S.current);
    S.tasks.shift();
    S.current = S.tasks[0] || null;
    S.phase   = S.current ? "active" : "complete";
    save();
    updateHeader();

    typing(function(){
      var msg = "Streak locked. 🔥 " + S.streak + " din.\n\n";
      if (S.current) {
        msg += "Agli task kal milegi — ya abhi dekhna hai?";
        addAI(msg);
        setChips(["Abhi next task dikhao","Aaj ke liye bas"], function(v){
          clearChips(); addUser(v);
          if (v.indexOf("next") !== -1) {
            setTimeout(showTask, 400);
          } else {
            typing(function(){
              addAI("Theek hai. Kal subah wapas aa.");
            }, 1000);
          }
        });
      } else {
        msg += "Sare tasks complete ho gaye.";
        addAI(msg);
      }
    }, 1200);
  });
}

function verifyProofWithAI(base64DataUrl, cb) {
  var taskName = S.current ? S.current.title : "study task";
  fetch("/api/verify-proof", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ imageDataUrl: base64DataUrl, taskName: taskName })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){ cb(d.valid !== false, d.reason || ""); })
  .catch(function(){ cb(true, ""); });
}

/* ===== FREE CHAT ===== */
function onSend() {
  var el  = document.getElementById("txt");
  var val = el.value.trim();
  if (!val) return;
  el.value = ""; onResize(el);
  disableInput();
  addUser(val);

  if (S.phase === "onboard") {
    processAnswer(val);
    return;
  }

  callAI(
    "[Phase:" + S.phase + " Task:" + (S.current ? S.current.title : "none") + " Streak:" + S.streak + " Missed:" + S.missedDays + "]\n" +
    "Student: " + val + "\n\nShort direct Hinglish response. Max 3 lines. No emojis.",
    250, function(r){
      addAI(r || "Bata kya ho raha hai.");
      enableInput();
    }
  );
}

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSend(); }
}

function onResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

/* ===== GROQ ===== */
function callGroqRaw(msgs, max, cb) {
  fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages: msgs, max_tokens: max, temperature: 0.75 })
  })
  .then(function(r){
    return r.json().then(function(d){
      if (!r.ok) cb(null, d.error || "Server error " + r.status);
      else cb(d.content, null);
    });
  })
  .catch(function(e){ cb(null, e.message || "Network error"); });
}

function callAI(userMsg, max, cb) {
  var msgs = S.history.slice(-10).concat([{ role:"user", content:userMsg }]);
  callGroqRaw(msgs, max, function(r, err){
    if (r) {
      S.history.push({ role:"user", content:userMsg });
      S.history.push({ role:"assistant", content:r });
      if (S.history.length > 20) S.history = S.history.slice(-20);
    }
    cb(r || (err ? "Error: " + err : "..."), err);
  });
}

/* ===== UI HELPERS ===== */
function addAI(text, strict) {
  var row = document.createElement("div");
  row.className = "row ai" + (strict ? " strict" : "");
  row.innerHTML =
    '<div class="row-av">H</div>' +
    '<div>' +
      '<div class="bbl">' + escH(text).replace(/\n/g,"<br>") + '</div>' +
      '<div class="ts">' + now() + '</div>' +
    '</div>';
  appendEl(row);
}

function addUser(text) {
  var row = document.createElement("div");
  row.className = "row user";
  row.innerHTML =
    '<div>' +
      '<div class="bbl">' + escH(text).replace(/\n/g,"<br>") + '</div>' +
      '<div class="ts">' + now() + '</div>' +
    '</div>';
  appendEl(row);
}

function typing(cb, delay) {
  var row = document.createElement("div");
  row.className = "typing-row";
  row.innerHTML =
    '<div class="row-av">H</div>' +
    '<div class="typing-bbl">' +
      '<div class="td"></div><div class="td"></div><div class="td"></div>' +
    '</div>';
  appendEl(row);
  var d = Math.max(delay || 1500, 1500); // minimum 1.5 sec
  setTimeout(function(){ row.remove(); cb(); }, d);
}

function appendEl(el) {
  var msgs = document.getElementById("msgs");
  msgs.appendChild(el);
  setTimeout(function(){ msgs.scrollTop = msgs.scrollHeight; }, 40);
}

function setChips(labels, cb) {
  var el = document.getElementById("chips");
  el.innerHTML = "";
  labels.forEach(function(lbl){
    var b = document.createElement("button");
    b.className = "chip";
    b.textContent = lbl;
    b.onclick = function(){ if(cb) cb(lbl); };
    el.appendChild(b);
  });
}

function clearChips() { document.getElementById("chips").innerHTML = ""; }

function enableInput() {
  document.getElementById("txt").disabled  = false;
  document.getElementById("sbtn").disabled = false;
  document.getElementById("txt").focus();
}

function disableInput() {
  document.getElementById("txt").disabled  = true;
  document.getElementById("sbtn").disabled = true;
}

function updateHeader() {
  var el = document.getElementById("h-streak");
  var sn = document.getElementById("streak-n");
  if (S.streak > 0) {
    el.classList.add("show");
    sn.textContent = S.streak;
  } else {
    el.classList.remove("show");
  }
}

function setStatus(txt) {
  var el = document.getElementById("h-sub");
  if (el) el.textContent = txt || "Online";
}

function extractF(text, key) {
  var re = new RegExp(key + ":\\s*([\\s\\S]+?)(?=\\n[A-Z_]+:|$)");
  var m  = text.match(re);
  return m ? m[1].trim() : null;
}

function escH(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function now() {
  var d = new Date();
  return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
}

function hardReset() {
  if (!confirm("Sab reset ho jayega. Pakka?")) return;
  try { localStorage.removeItem("hb_v5"); } catch(e){}
  location.reload();
}

</script>
